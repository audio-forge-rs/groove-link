  piano_harmony_2:
    instrument:
      query: Piano Uno - Dark
      hint: kontakt
    part: piano-harmony-2.abc

  # Guitar melody 1 - Picked melody, fingerstyle
  guitar_melody_1:
    instrument:
      query: Picked Acoustic (Melody)
      hint: kontakt
    part: guitar-melody-1.abc

  # Guitar harmony 1 - Strummed chords, folk rhythm
  guitar_harmony_1:
    instrument:
      query: Strummed Acoustic
      hint: kontakt
    part: guitar-harmony-1.abc

  # Guitar melody 2 - Alt melody, synthetic acoustic
  guitar_melody_2:
