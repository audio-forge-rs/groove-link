  # Piano harmony 1 - Chord pads, modeled piano
  piano_harmony_1:
    instrument: Physical-Piano
    part: piano-harmony-1.abc

  # Piano melody 2 - Counter-melody, concert grand
  piano_melody_2:
    instrument:
      query: Piano Uno - Concert
      hint: kontakt
